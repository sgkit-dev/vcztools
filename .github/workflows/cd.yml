name: CD

on:
  push:
    branches: [main, test-publish]
    tags:
      - '*'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sdist:
    if: github.repository_owner == 'sgkit-dev'
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist -o dist

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    if: github.repository_owner == 'sgkit-dev'
    needs: [build-sdist]
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-sdist

      - name: Copy sdist
        run: cp *.tar.gz sdist.tar.gz

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Install cibuildwheel
        run: uv sync --locked --only-group wheels

      - name: Build wheels
        run: uv run --only-group wheels cibuildwheel sdist.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  publish-to-pypi:
    if: github.repository_owner == 'sgkit-dev' && github.event_name == 'release'
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/vcztools
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: build-*
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -lah dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  publish-to-testpypi:
    if: github.repository_owner == 'sgkit-dev' && github.event_name == 'push' && (github.ref_name == 'test-publish' || startsWith(github.event.ref, 'refs/tags'))
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/vcztools

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: build-*
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -lah dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/
